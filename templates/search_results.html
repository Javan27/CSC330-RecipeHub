<!DOCTYPE html>
<html>
<head><title>Search Results</title></head>
<body>
    <h1>Search</h1>
    <form action="/search" method="GET">
        <input type="text" name="q" placeholder="Search..." value="{{ query }}">
        <button type="submit">Search</button>
    </form>
    <hr>
    {% if query %}
        <h2>Results:</h2>
        <ul>
            {% for item in results %}
                <li>
                    <a href="/recipe/{{ item.recipe.id }}"><strong>{{ item.recipe.name }}</strong></a> 
                    - By: {{ item.recipe.owner.username }}
                    {% if item.context %}<br><small style="color: green;">{{ item.context }}</small>{% endif %}
                </li>
            {% endfor %}
        </ul>
    {% endif %}
    <a href="{{ url_for('index') }}">Back</a>
</body>
</html>
