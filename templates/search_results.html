<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="page-body">

    <div class="container search-container">

        <h1 class="page-title">Search</h1>

        <form class="search-form form-row" action="/search" method="GET">
            <input 
                class="form-input search-input" 
                type="text" 
                name="q" 
                placeholder="Search..." 
                value="{{ query }}"
            >

            <button class="btn btn-primary" type="submit">
                Search
            </button>
        </form>

        <hr class="divider">

        {% if query %}
            <h2 class="section-title">Results:</h2>

            <ul class="search-results-list">

                {% for item in results %}
                    <li class="search-result-item card">

                        <a class="recipe-link" href="/recipe/{{ item.recipe.id }}">
                            <strong class="result-title">{{ item.recipe.name }}</strong>
                        </a> 

                        <p class="result-meta">
                            By: <span class="author-name">{{ item.recipe.owner.username }}</span>
                        </p>

                        {% if item.context %}
                            <p class="result-context">
                                {{ item.context }}
                            </p>
                        {% endif %}

                    </li>
                {% endfor %}

            </ul>
        {% endif %}

        <a class="nav-link back-link" href="{{ url_for('index') }}">
            ← Back
        </a>

    </div>

</body>
</html>
