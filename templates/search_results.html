<!DOCTYPE html>
<html>
<head><title>Search Results</title></head>
<body>
    <h1>Search</h1>
<form action="/search" method="GET" style="display: flex; flex-direction: column; gap: 10px; max-width: 400px;">
    <div>
        <label>Recipe Name:</label><br>
        <input type="text" name="q_name" placeholder="Search names..." value="{{ q_name or '' }}">
    </div>
    <div>
        <label>Ingredients:</label><br>
        <input type="text" name="q_ing" placeholder="e.g. Chicken, Tomato..." value="{{ q_ing or '' }}">
    </div>
    <div style="display: flex; flex-direction: column;">
        <label style="font-weight: bold;">Dietary Tag</label>
        <select name="q_tag">
            <option value="">Any Tag</option>
            <option value="Vegan" {% if q_tag == 'Vegan' %}selected{% endif %}>Vegan</option>
            <option value="Keto" {% if q_tag == 'Keto' %}selected{% endif %}>Keto</option>
            <option value="Gluten-Free" {% if q_tag == 'Gluten-Free' %}selected{% endif %}>Gluten-Free</option>
            <option value="Vegetarian" {% if q_tag == 'Vegetarian' %}selected{% endif %}>Vegetarian</option>
        </select>
    </div>
    <button type="submit">Search</button>
</form>
    <a href="{{ url_for('index') }}">Back</a>
</body>
</html>
