<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Recipe Dashboard</title>
</head>

<body class="page-body">

    <div class="container dashboard-container">

        <h1 class="page-title">Recipe Dashboard</h1>

        <p class="nav-bar">
            Logged in as: 
            <strong class="username">
                <span id="current-user"></span>
            </strong> | 
            <a class="nav-link" href="/">My Dashboard</a> | 
            <a class="nav-link" href="/feed">Global Feed</a> | 
            <a class="nav-link" href="/search">Search</a> | 
            <a class="nav-link" href="/logout">Logout</a>
            {% if is_admin %}
                | <a class="admin-link" href="/admin" style="color: var(--orange); font-weight: bold;">Admin Panel</a>
            {% endif %}
        </p>

        <hr class="divider">

        <div class="card form-card">

            <h3 class="section-title">Create New Recipe</h3>

            <div class="form-group">
                <label class="form-label">Recipe Name:</label>
                <input class="form-input" type="text" id="new-recipe-name" placeholder="Enter name...">
            </div>

            <div class="form-group">
                <label class="form-label">Default Servings:</label>
                <input class="form-input" type="number" id="new-serving-size" min="1" value="1">
            </div>

            <div id="ingredient-container">
                <p class="section-label"><strong>Ingredients (Name and Unit Required):</strong></p>
                <div class="ingredient-row form-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input class="form-input ing-qty" type="text" placeholder="Qty" style="width: 80px;">
                    <select class="form-select ing-unit" style="width: 130px;">
                        <option value="">Unit</option>
                        <option value="tsp">Teaspoon</option>
                        <option value="tbsp">Tablespoon</option>
                        <option value="cup">Cup</option>
                        <option value="g">Grams</option>
                        <option value="oz">Ounces</option>
                        <option value="ml">Milliliters</option>
                        <option value="lb">Pounds</option>
                        <option value="pinch">Pinch</option>
                        <option value="piece">Piece</option>
                    </select>
                    <input class="form-input ing-name" type="text" placeholder="Ingredient Name" style="flex: 1;">
                </div>
            </div>

            <button class="btn btn-secondary" type="button" id="add-ingredient-btn" style="margin-top: 10px;">
                + Add Ingredient
            </button>

            <div class="form-group" style="margin-top: 20px;">
                <label class="form-label">Instructions:</label>
                <textarea class="form-textarea" id="new-instructions" placeholder="Step-by-step guide..."></textarea>
            </div>

            <div class="form-row card" style="background: #fdfdfd; padding: 15px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap;">
                <div class="form-group">
                    <label class="form-label">Calories</label>
                    <input class="form-input" type="number" id="new-calories" value="0" style="width: 85px;">
                </div>
                <div class="form-group">
                    <label class="form-label">Protein (g)</label>
                    <input class="form-input" type="number" id="new-protein" value="0" style="width: 85px;">
                </div>
                <div class="form-group">
                    <label class="form-label">Carbs (g)</label>
                    <input class="form-input" type="number" id="new-carbs" value="0" style="width: 85px;">
                </div>
                <div class="form-group">
                    <label class="form-label">Fat (g)</label>
                    <input class="form-input" type="number" id="new-fat" value="0" style="width: 85px;">
                </div>
            </div>
            
            <div class="form-row" style="display: flex; gap: 20px; align-items: center;">
                <div class="form-group">
                    <label class="form-label">Category Tag:</label>
                    <select class="form-select" id="new-tags">
                        <option value="">No Tag</option>
                        <option value="keto">Keto</option>
                        <option value="sugar-free">Sugar-Free</option>
                        <option value="protein">Protein</option>
                        <option value="nut-free">Nut-Free</option>
                        <option value="vegan">Vegan</option>
                    </select>
                </div>

                <label class="checkbox-label" style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox" id="new-is-public" checked> 
                    Make Public
                </label>
            </div>

            <button class="btn btn-primary" id="btn-create-recipe" style="width: 100%; margin-top: 15px;">
                Create Recipe
            </button>

        </div>

        <hr class="divider">
        
        <h2 class="section-title">My Original Recipes</h2>
        <div id="original-recipes-grid" class="grid"></div>

        <hr class="divider">
      
        <h2 class="section-title">Forked Recipes</h2>
        <div id="forked-recipes-grid" class="grid"></div>

    </div>

 <script>
    window.APP_DATA = { username: "{{ username }}" };
</script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
