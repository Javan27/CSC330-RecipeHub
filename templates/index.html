<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Recipe Dashboard</title>
</head>

<body class="page-body">

    <div class="container dashboard-container">

        <h1 class="page-title">Recipe Dashboard</h1>

        <p class="nav-bar">
            Logged in as: 
            <strong class="username">
                <span id="current-user"></span>
            </strong> | 
            <a class="nav-link" href="/">My Dashboard</a> | 
            <a class="nav-link" href="/feed">Global Feed</a> | 
            <a class="nav-link" href="/search">Search</a> | 
            <a class="nav-link" href="/logout">Logout</a>
        </p>

        <hr class="divider">

        <!-- CREATE RECIPE SECTION -->
        <div class="card form-card">

            <h3 class="section-title">Create New Recipe</h3>

            <input class="form-input" type="text" id="new-recipe-name" placeholder="Recipe Name (Required)">

            <input class="form-input" type="number" id="new-serving-size" placeholder="Servings" min="1" value="1">

            {% if is_admin %}
                <a class="admin-link" href="/admin">Admin Panel</a>
            {% endif %}

            <div id="ingredient-container" class="ingredient-container">
                <p class="section-label"><strong>Ingredients:</strong></p>

                <div class="ingredient-row form-row">
                    <input class="form-input ing-qty" type="text" placeholder="Qty">

                    <select class="form-select ing-unit">
                        <option value="">Unit</option>
                        <option value="tsp">Teaspoon</option>
                        <option value="tbsp">Tablespoon</option>
                        <option value="cup">Cup</option>
                        <option value="g">Grams</option>
                        <option value="oz">Ounces</option>
                        <option value="ml">Milliliters</option>
                        <option value="lb">Pounds</option>
                        <option value="pinch">Pinch</option>
                        <option value="piece">Piece</option>
                    </select>

                    <input class="form-input ing-name" type="text" placeholder="Ingredient Name">
                </div>
            </div>

            <button class="btn btn-secondary" type="button" id="add-ingredient-btn">
                + Add Ingredient
            </button>

            <br>

            <textarea class="form-textarea" id="new-instructions" placeholder="Enter cooking instructions here..."></textarea>
            
            <div class="form-row spaced-row">

                <div class="form-group">
                    <label class="form-label">Category Tag:</label>

                    <select class="form-select" id="new-tags">
                        <option value="">No Tag</option>
                        <option value="keto">Keto</option>
                        <option value="sugar-free">Sugar-Free</option>
                        <option value="protein">Protein</option>
                        <option value="nut-free">Nut-Free</option>
                        <option value="vegan">Vegan</option>
                    </select>
                </div>

                <label class="checkbox-label">
                    <input type="checkbox" id="new-is-public" checked> 
                    Make Public
                </label>
            </div>

            <button class="btn btn-primary" id="btn-create-recipe">
                Create Recipe
            </button>

        </div>

        <hr class="divider">

        
        <h2 class="section-title">My Original Recipes</h2>
        <div id="original-recipes-grid" class="grid"></div>

        <hr class="divider">

      
        <h2 class="section-title">Forked Recipes</h2>
        <div id="forked-recipes-grid" class="grid"></div>

    </div>

 <script>
    window.APP_DATA = {
        username: "{{ username }}"
    };
</script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
