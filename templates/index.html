<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Recipe Dashboard</title>
</head>
<body>

    <div>
        <h1>Recipe Dashboard</h1>
        <p><strong>Logged in as:</strong> <span id="current-user">Javan</span></p>
    </div>

    <hr>

    <div>
        <h3>Create New Recipe</h3>
        <label for="new-recipe-name">Recipe Name:</label>
        <input type="text" id="new-recipe-name" placeholder="e.g., Chocolate Chip Cookies">
        
        <label for="new-serving-size">Servings:</label>
        <input type="number" id="new-serving-size" placeholder="e.g., 4" min="1">
        
        <button id="btn-create-recipe">Create Recipe</button>
    </div>

    <hr>

    <div id="recipe-grid">
        </div>

    <script>
        const loggedInUser = { username: "Javan" };
        document.getElementById('current-user').innerText = loggedInUser.username;

        // Fetch all recipes from the Flask database on load
        async function renderGrid() {
            const grid = document.getElementById('recipe-grid');
            
            try {
                const response = await fetch('/api/recipes');
                const recipes = await response.json();

                grid.innerHTML = ''; 

                if (recipes.length === 0) {
                    grid.innerHTML = `<p>No recipes yet. Create one above!</p>`;
                    return;
                }

                recipes.forEach(recipe => {
                    const card = document.createElement('div');
                    card.innerHTML = `
                        <hr>
                        <h2>${recipe.name}</h2>
                        <p><strong>Servings:</strong> ${recipe.servings}</p>
                        <button onclick="deleteRecipe(${recipe.id})">Delete Recipe</button>
                        <p><em>Database ID: ${recipe.id}</em></p>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("Error loading recipes:", err);
                grid.innerHTML = `<p>Error connecting to database. Make sure Flask is running!</p>`;
            }
        }

        // Send a new recipe to the Flask backend
        document.getElementById('btn-create-recipe').addEventListener('click', async () => {
            const nameInput = document.getElementById('new-recipe-name');
            const servingInput = document.getElementById('new-serving-size');
            
            const name = nameInput.value.trim();
            const servings = servingInput.value.trim() || '4';

            if (!name) {
                alert('Enter a recipe name!');
                return;
            }

            const response = await fetch('/api/recipes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, servings })
            });

            if (response.ok) {
                nameInput.value = ''; 
                servingInput.value = ''; 
                renderGrid(); // Refresh grid to show the new db entry
            }
        });

        // Delete recipe from the database
        async function deleteRecipe(recipeId) {
            if (confirm('Are you sure?')) {
                await fetch(`/api/recipes/${recipeId}`, { method: 'DELETE' });
                renderGrid();
            }
        }

        // Initial load
        renderGrid();
    </script>
</body>
</html>
