<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Recipe Dashboard</title>
</head>
<body>

    <div>
        <h1>Recipe Dashboard</h1>
        <p><strong>Logged in as:</strong> <span id="current-user">Javan</span></p>
    </div>

    <hr>

    <div>
        <h3>Create New Recipe</h3>
        <label for="new-recipe-name">Recipe Name:</label>
        <input type="text" id="new-recipe-name" placeholder="e.g., Chocolate Chip Cookies">
        
        <label for="new-serving-size">Servings:</label>
        <input type="number" id="new-serving-size" placeholder="e.g., 4" min="1">
        
        <button id="btn-create-recipe">Create Recipe</button>
    </div>

    <hr>

    <div id="recipe-grid">
        </div>

    <script>
        // Simulated user
        const loggedInUser = { username: "Javan" };
        document.getElementById('current-user').innerText = loggedInUser.username;

        // The main data array holding the recipes liek memory 
        let recipes = [];

        // Add a new recipe card
        document.getElementById('btn-create-recipe').addEventListener('click', () => {
            const nameInput = document.getElementById('new-recipe-name');
            const servingInput = document.getElementById('new-serving-size');
            
            const name = nameInput.value.trim();
            const servings = servingInput.value.trim() || '4'; // Automatically makes it 4 if user does not enter 

            if (!name) {
                alert('Enter a recipe name!');
                return;
            }

            recipes.push({
                id: Date.now(), // unique ID
                name: name,
                servings: servings,
                ingredients: []
            });

            // clear inputs
            nameInput.value = ''; 
            servingInput.value = ''; 
            
            renderGrid();
        });

        // Render the entire dashboard grid
        function renderGrid() {
            const grid = document.getElementById('recipe-grid');
            grid.innerHTML = ''; // clear grid

            if (recipes.length === 0) {
                grid.innerHTML = `<p>No recipes yet. Create one above!</p>`;
                return;
            }

            recipes.forEach(recipe => {
                const card = document.createElement('div');
                
                // Card header, delete button, and serving size
                let cardHTML = `
                    <hr>
                    <h2>${recipe.name}</h2>
                    <p><strong>Servings:</strong> ${recipe.servings}</p>
                    <button onclick="deleteRecipe(${recipe.id})">Delete Recipe</button>
                    
                    <h4>Ingredients</h4>
                    <div>
                        <input type="text" id="ing-qty-${recipe.id}" placeholder="Qty" style="width: 50px;">
                        <input type="text" id="ing-unit-${recipe.id}" placeholder="Unit" style="width: 70px;">
                        <input type="text" id="ing-name-${recipe.id}" placeholder="Ingredient...">
                        <button onclick="addIngredient(${recipe.id})">Add Ingredient</button>
                    </div>
                    
                    <ul>
                `;

                // Add ingredients to card
                if (recipe.ingredients.length === 0) {
                    cardHTML += `<li>No ingredients yet.</li>`;
                } else {
                    recipe.ingredients.forEach(ingredient => {
                        cardHTML += `
                            <li>
                                <strong>${ing.quantity} ${ing.unit}</strong> ${ing.name}
                                <button onclick="deleteIngredient(${recipe.id}, ${ing.id})">x</button>
                            </li>
                        `;
                    });
                }

                cardHTML += `</ul>`;
                card.innerHTML = cardHTML;
                grid.appendChild(card);
            });
        }

        // Delete a whole recipe card
        function deleteRecipe(recipeId) {
            if (confirm('Are you sure you want to delete this recipe?')) {
                recipes = recipes.filter(r => r.id !== recipeId);
                renderGrid();
            }
        }

        // Add an ingredient to a recipe card
        function addIngredient(recipeId) {
            const qtyInput = document.getElementById(`ing-qty-${recipeId}`);
            const unitInput = document.getElementById(`ing-unit-${recipeId}`);
            const nameInput = document.getElementById(`ing-name-${recipeId}`);

            const qty = qtyInput.value.trim() || '1';
            const unit = unitInput.value.trim() || 'unit';
            const name = nameInput.value.trim();

            if (!name) {
                alert('Ingredient name cannot be empty!');
                return;
            }

            const recipe = recipes.find(r => r.id === recipeId);
            if (recipe) {
                recipe.ingredients.push({
                    id: Date.now(),
                    quantity: qty,
                    unit: unit,
                    name: name
                });
                renderGrid();
            }
        }

        // Delete a specific ingredient from a recipe card
        function deleteIngredient(recipeId, ingredientId) {
            const recipe = recipes.find(r => r.id === recipeId);
            if (recipe) {
                recipe.ingredients = recipe.ingredients.filter(ing => ing.id !== ingredientId);
                renderGrid();
            }
        }

        // Initial render on load (will be empty)
        renderGrid();
    </script>
</body>
</html>
