<!DOCTYPE html>
<html>
<head>
    <title>Edit Recipe</title>
</head>
<body>
    <h1>Edit: {{ recipe.name }}</h1>

    <form method="POST">
        <div>
            <label>Recipe Name:</label><br>
            <input type="text" name="name" value="{{ recipe.name }}" required>
        </div>

        <div>
            <label>Servings:</label><br>
            <input type="number" name="servings" value="{{ recipe.servings }}">
        </div>

        <div>
            <label>Instructions:</label><br>
            <textarea name="instructions" rows="5" style="width: 100%;">{{ recipe.instructions }}</textarea>
        </div>

        <h3>Ingredients</h3>
        <div id="ingredient-container">
            {% for ing in recipe.ingredients %}
            <div class="ingredient-row" style="margin-bottom: 5px;">
                <input type="text" name="ing_qty" value="{{ ing.quantity }}" placeholder="Qty" style="width: 50px;">
                <input type="text" name="ing_unit" value="{{ ing.unit }}" placeholder="Unit" style="width: 80px;">
                <input type="text" name="ing_name" value="{{ ing.name }}" placeholder="Ingredient Name">
            </div>
            {% endfor %}
            
            <hr>
            <p><strong>Add New Ingredients:</strong></p>
            <div class="ingredient-row">
                <input type="text" name="ing_qty" placeholder="Qty" style="width: 50px;">
                <input type="text" name="ing_unit" placeholder="Unit" style="width: 80px;">
                <input type="text" name="ing_name" placeholder="New Ingredient">
            </div>
        </div>

        <h3>Macros</h3>
        <p>
            <label>Calories:</label> <input type="number" name="calories" value="{{ recipe.calories }}"> <br>
            <label>Protein (g):</label> <input type="number" name="protein" value="{{ recipe.protein }}"> <br>
            <label>Carbs (g):</label> <input type="number" name="carbs" value="{{ recipe.carbs }}"> <br>
            <label>Fat (g):</label> <input type="number" name="fat" value="{{ recipe.fat }}">
        </p>

        <h3>Tags & Privacy</h3>
        <div>
            <label>Dietary Tag:</label>
            <select name="tags">
                {% set tags = ['None', 'Vegan', 'Keto', 'Vegetarian', 'Gluten-Free', 'Sugar-Free', 'Protein', 'Nut-Free'] %}
                {% for tag in tags %}
                    <option value="{{ tag }}" {% if recipe.tags == tag %}selected{% endif %}>{{ tag }}</option>
                {% endfor %}
            </select>
        </div>

        <p>
            <label>
                <input type="checkbox" name="is_public" {% if recipe.is_public %}checked{% endif %}>
                Publicly Viewable
            </label>
        </p>

        <button type="submit">Save Changes</button>
        <a href="{{ url_for('index') }}">Cancel</a>
    </form>
</body>
</html>
