<!DOCTYPE html>
<html>
<head>
    <title>Edit Recipe</title>
    <style>
        .ingredient-row { margin-bottom: 5px; display: flex; gap: 5px; }
        .ing-qty { width: 50px; }
        .ing-unit { width: 100px; }
    </style>
</head>
<body>
    <h1>Edit: {{ recipe.name }}</h1>

    <form method="POST">
        <!-- Basic Info & Instructions -->
        <div>
            <label>Recipe Name:</label><br>
            <input type="text" name="name" value="{{ recipe.name }}" required>
        </div>
        <br>
        <div>
            <label>Instructions:</label><br>
            <textarea name="instructions" rows="5" style="width: 100%;">{{ recipe.instructions }}</textarea>
        </div>

        <h3>Ingredients</h3>
        <div id="ingredient-container">
            {% for ing in recipe.ingredients %}
            <div class="ingredient-row">
                <input type="text" name="ing_qty" class="ing-qty" value="{{ ing.quantity }}" placeholder="Qty">
                <select name="ing_unit" class="ing-unit">
                    <option value="">Unit</option>
                    <option value="tsp" {% if ing.unit == 'tsp' %}selected{% endif %}>Teaspoon</option>
                    <option value="tbsp" {% if ing.unit == 'tbsp' %}selected{% endif %}>Tablespoon</option>
                    <option value="cup" {% if ing.unit == 'cup' %}selected{% endif %}>Cup</option>
                    <option value="g" {% if ing.unit == 'g' %}selected{% endif %}>Grams</option>
                    <option value="oz" {% if ing.unit == 'oz' %}selected{% endif %}>Ounces</option>
                    <option value="ml" {% if ing.unit == 'ml' %}selected{% endif %}>Milliliters</option>
                    <option value="lb" {% if ing.unit == 'lb' %}selected{% endif %}>Pounds</option>
                    <option value="pinch" {% if ing.unit == 'pinch' %}selected{% endif %}>Pinch</option>
                    <option value="piece" {% if ing.unit == 'piece' %}selected{% endif %}>Piece</option>
                </select>
                <input type="text" name="ing_name" value="{{ ing.name }}" placeholder="Ingredient Name">
            </div>
            {% endfor %}
        </div>
        
        <button type="button" id="add-ingredient-btn" style="margin-top: 10px;">+ Add Ingredient</button>

        <!-- Macros, Tags, and Privacy (Keep your existing code for these) -->
        <hr>
        <button type="submit">Save Changes</button>
        <a href="{{ url_for('index') }}">Cancel</a>
    </form>

    <script>
        document.getElementById('add-ingredient-btn').addEventListener('click', () => {
            const container = document.getElementById('ingredient-container');
            const newRow = document.createElement('div');
            newRow.className = 'ingredient-row';
            newRow.innerHTML = `
                <input type="text" name="ing_qty" class="ing-qty" placeholder="Qty">
                <select name="ing_unit" class="ing-unit">
                    <option value="">Unit</option>
                    <option value="tsp">Teaspoon</option>
                    <option value="tbsp">Tablespoon</option>
                    <option value="cup">Cup</option>
                    <option value="g">Grams</option>
                    <option value="oz">Ounces</option>
                    <option value="ml">Milliliters</option>
                    <option value="lb">Pounds</option>
                    <option value="pinch">Pinch</option>
                    <option value="piece">Piece</option>
                </select>
                <input type="text" name="ing_name" placeholder="Ingredient Name">
            `;
            container.appendChild(newRow);
        });
    </script>
</body>
</html>
